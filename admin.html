<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Manager AI - Admin Dashboard</title>
    
    <!-- Premium Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

    <!-- Apple Music Lyric Style Ambient Background -->
    <div class="ambient-background">
        <div class="ambient-orb orb-1"></div>
        <div class="ambient-orb orb-2"></div>
        <div class="ambient-orb orb-3"></div>
        <div class="ambient-orb orb-4"></div>
        <div class="ambient-particle particle-1">Health</div>
        <div class="ambient-particle particle-2">AI Insights</div>
        <div class="ambient-particle particle-3">Budget</div>
    </div>

    <!-- Mobile Navigation Bar (Hidden on Desktop) -->
    <nav class="mobile-navbar glass-panel">
        <div class="mobile-logo">Expense Tracker</div>
        <button id="mobile-menu-btn" class="hamburger-btn">☰</button>
    </nav>

    <!-- Sidebar for User List -->
    <div id="sidebar" class="sidebar glass-panel">
        <h2>Admin Panel</h2>
        <div id="user-list-container" style="margin-top: 20px;">
            <p style="padding-left: 20px; color: #7f8c8d;">Registered Users:</p>
            <div id="user-list" style="display: flex; flex-direction: column; gap: 5px; margin-top: 10px;">
                <!-- User items will appear here -->
                <p style="padding-left: 20px; font-size: 0.9em; color: #bdc3c7;">Loading users...</p>
            </div>
        </div>
        <a href="#" id="admin-logout" class="premium-btn" style="margin-top: auto; align-self: center; width: 80%; text-align: center; padding: 10px; font-size: 14px; border-radius: 8px;">Logout</a>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">
        <header>
            <h1 id="selected-user-name">Welcome, Admin</h1>
            <p id="selected-user-email">Select a user from the sidebar to view their expenses.</p>
        </header>

        <div class="expense-history" style="margin-top: 30px;">
            <h2>User Expense History</h2>
            <table class="expense-table glass-panel">
                <thead>
                    <tr>
                        <th>S.No</th>
                        <th>Date</th>
                        <th>Expense Name</th>
                        <th>Amount Spent (₹)</th>
                    </tr>
                </thead>
                <tbody id="admin-expense-list">
                    <tr>
                        <td colspan="4" style="text-align: center; color: #7f8c8d;">No user selected</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
